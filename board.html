<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/content-limit.css">
    <link rel="stylesheet" href="./styles/sidebar.css">
    <link rel="stylesheet" href="./styles/header.css">
    <link rel="stylesheet" href="./styles/board.css">
    <link rel="stylesheet" href="./styles/modal.css">
    <link rel="stylesheet" href="./styles/modal-subtask.css">
    <link rel="stylesheet" href="./styles/board-edit.css">
    <link rel="stylesheet" href="./styles/board-tasks.css">
    <link rel="stylesheet" href="./styles/board-task-form.css">
    <link rel="stylesheet" href="./styles/board-task-form-responsive.css">
    <link rel="stylesheet" href="./styles/board-responsive.css">
    <link rel="icon" type="image/png" href="./assets/img/join-logo-white.svg">

    <!-- Auth Guard - MUSS VOR anderen Scripts laden -->
    <script src="./firebase.js" defer></script>
    <script src="./script.js" defer></script>
    <script src="./scripts/sidebar.js" defer></script>
    <script src="./scripts/add-task.js" defer></script>
    <script src="./scripts/add-task-subtasks.js" defer></script>
    <script src="./scripts/add-task-templates.js" defer></script>
    <script src="./scripts/board-modal-templates.js" defer></script>
    <script src="./scripts/board-template.js" defer></script>
    <script src="./scripts/board-state.js" defer></script>
    <script src="./scripts/board-avatars.js" defer></script>
    <script src="./scripts/board-render.js" defer></script>
    <script src="./scripts/board-api.js" defer></script>
    <script src="./scripts/board-dnd.js" defer></script>
    <script src="./scripts/board-modal.js" defer></script>
    <script src="./scripts/board-edit.js" defer></script>
    <script src="./scripts/board-addtask-dialog.js" defer></script>
</head>

<body onload="loadTasks()">
    <div class="app">
        <nav class="sidebar">
            <img class="logo-sidebar" src="./assets/img/join-logo-white.svg" alt="Join Logo">

            <ul>
                <li onclick="sidebarHighlightingSummary()" class="sidebar-li-hover-effect" id="summary-li">
                    <div>
                        <img src="./assets/icons/vector-summ.svg" alt="Summary-Icon">
                        <a href="summary.html" aria-current="page">Summary</a>
                    </div>
                </li>
                <li onclick="sidebarHighlightingAddTask()" class="sidebar-li-hover-effect" id="add-task-li">
                    <div>
                        <img src="./assets/icons/edit-square.svg" alt=" Edit-Square-Icon">
                        <a href="add-task.html">Add Task</a>
                    </div>
                </li>
                <li onclick="sidebarHighlightingBoard()" class="highlighted" id="board-li">
                    <div>
                        <img src="./assets/icons/vector-board.svg" alt="Board-Icon">
                        <a href="board.html">Board</a>
                    </div>
                </li>
                <li onclick="sidebarHighlightingContacts()" class="sidebar-li-hover-effect" id="contacts-li">
                    <div>
                        <img src="./assets/icons/perm-contact-calendar.svg" alt="Contact-Calendar-Icon">
                        <a href="contacts.html">Contacts</a>
                    </div>
                </li>
            </ul>

            <footer class="sidebar-footer">
                <div class="footer-link-container" id="privacy-policy-div">
                    <a href="./privacy-policy.html" class="sidebar-footer-link-hover-effect">Privacy Policy</a>
                </div>
                <div class="footer-link-container" id="legal-notice-div">
                    <a href="./legal-notice.html" class="sidebar-footer-link-hover-effect">Legal notice</a>
                </div>
            </footer>
        </nav>

        <main class="main">
            <header>
                <div class="content-limit content-limit--row content-limit--no-padding content-limit--left">
                    <img class="header-logo" src="./assets/img/join-logo.svg" alt="Join Logo">
                    <div class="center">
                        <p class="app-tagline">Kanban Project Management Tool</p>
                    </div>
                    <div class="user-actions">
                        <a href="./help.html">
                            <img class="help-icon" src="./assets/icons/help.svg" alt="Help" onclick="navigateToHelp()">
                        </a>
                        <div class="user-profile-container">
                            <span class="user-profile" id="user-profile" onclick="toggleProfileMenu(event)">G</span>
                            <div class="profile-menu" id="profile-menu">
                                <div onclick="navigateToHelp()" class="profile-menu-item-container profile-menu-item-help">
                                    <div class="profile-menu-center">
                                        <a href="./help.html">Help</a>
                                    </div>
                                </div>

                                <div onclick="navigateToLegalNotice()" class="profile-menu-item-container">
                                    <div class="profile-menu-center">
                                        <a href="./legal-notice.html">Legal Notice</a>
                                    </div>
                                </div>

                                <div onclick="navigateToPrivacyPolicy()" class="profile-menu-item-container">
                                    <div class="profile-menu-center">
                                        <a href="./privacy-policy.html">Privacy Policy</a>
                                    </div>
                                </div>

                                <div onclick="logout(event)" class="profile-menu-item-container">
                                    <div class="profile-menu-center">
                                        <button type="button">Log out</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content content-limit content-limit--no-padding content-limit--left" id="board-content">

                <div class="board-header">
                    <h1>Board</h1>
                    <img src="./assets/icons/plus-add-task-mobile.svg" alt="Add Task Button" class="add-task-mobile-btn"
                        onclick="showAddTaskDialog()">
                    <div class="board-actions">
                        <div tabindex="0" class="board-search">
                            <input id="search-task" type="text" placeholder="Find Task">
                            <button id="search-clear" class="search-clear" type="button"
                                aria-label="Clear search">×</button>
                            <div class="search-divider"></div>
                            <span class="search-highlight">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1110.5 3a7.5 7.5 0 016.15 13.65z" />
                                </svg>
                            </span>
                        </div>
                        <button class="add-task-btn" onclick="showAddTaskDialog()">Add Task +</button>
                    </div>
                </div>

                <div class="board-columns">
                    <div class="board-column" id="todo-column" ondragover="allowDrop(event)"
                        ondrop="dropTask(event, 'To Do')">
                        <div class="column-header">
                            <h2 class="column-title">To Do</h2>
                            <img src="./assets/icons/plus-button.svg" alt="Add Task Button" width="30" height="30"
                                onclick="showAddTaskDialog()">
                        </div>
                        <div class="task-wrapper">
                            <div class="no-tasks">
                                <span>No tasks To do</span>
                            </div>
                        </div>
                    </div>

                    <div class="board-column" id="inprogress-column" ondragover="allowDrop(event)"
                        ondrop="dropTask(event, 'In Progress')">
                        <div class="column-header">
                            <h2 class="column-title">In Progress</h2>
                            <img src="./assets/icons/plus-button.svg" alt="Add Task Button" width="30" height="30"
                                onclick="showAddTaskDialog()">
                        </div>
                        <div class="task-wrapper">
                            <div class="no-tasks">
                                <span>No tasks To do</span>
                            </div>
                        </div>
                    </div>

                    <div class="board-column" id="awaiting-column" ondragover="allowDrop(event)"
                        ondrop="dropTask(event, 'Await Feedback')">
                        <div class="column-header">
                            <h2 class="column-title">Await Feedback</h2>
                            <img src="./assets/icons/plus-button.svg" alt="Add Task Button" width="30" height="30"
                                onclick="showAddTaskDialog()">
                        </div>
                        <div class="task-wrapper">
                            <div class="no-tasks">
                                <span>No tasks To do</span>
                            </div>
                        </div>
                    </div>

                    <div class="board-column" id="done-column" ondragover="allowDrop(event)"
                        ondrop="dropTask(event, 'Done')">
                        <div class="column-header">
                            <h2 class="column-title">Done</h2>
                        </div>
                        <div class="task-wrapper">
                            <div class="no-tasks">
                                <span>No tasks To do</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </main>
    </div>
    <div id="add-task-dialog" class="add-task-dialog-bg d-none">
        <div id="add-task-dialog-message" class="add-task-dialog">

        </div>
    </div>
</body>

</html>
