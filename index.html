<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join - Login</title>
  <link rel="stylesheet" href="./styles/fonts.css">
  <link rel="stylesheet" href="./styles/content-limit.css">
  <link rel="stylesheet" href="./styles/login.css">
  <link rel="stylesheet" href="./styles/login-responsive.css">
  <link rel="icon" type="image/png" href="./assets/img/join-logo-white.svg">


  <script src="./scripts/login.js" defer></script>
  <script src="./script.js" defer></script>
</head>

<body>
  <!-- Intro Animation -->
  <div class="intro-overlay" id="intro-overlay">
    <img src="./assets/img/join-logo-white.svg" alt="Join Logo" class="intro-logo intro-logo-white" aria-hidden="true">
    <img src="./assets/img/join-logo.svg" alt="Join Logo" class="intro-logo" id="intro-logo">
  </div>

  <div class="main-content" id="main-content">
    <header class="header">
      <div class="content-limit content-limit--row">
        <div class="header-left">
          <img src="./assets/img/join-logo.svg" alt="Join Logo">
        </div>
        <div class="header-right">
          <span>Not a Join User?</span>
          <button onclick="navigateToSignup()" class="btn-signup">Sign Up</button>
        </div>
      </div>
    </header>

    <div class="content-limit">
      <div class="content">
        <div class="login">
          <h1>Log In</h1>
          <div class="login-separater"></div>
          <form class="login-input">
            <div class="input-field">
              <input type="email" id="login-email" class="input-placeholder login-input-email" placeholder="Email">
              <img src="./assets/icons/mail.svg" alt="">
            </div>
            <div class="input-field">
              <input type="password" id="login-password" class="input-placeholder login-input-password"
                placeholder="Password">
              <img src="./assets/icons/lock.svg" alt="" id="lock-icon">
              <img src="./assets/icons/visibility-off.svg" alt="" id="visibility-off-icon"
                class="is-hidden password-toggle">
              <img src="./assets/icons/visibility.svg" alt="" id="visibility-icon" class="is-hidden password-toggle">
            </div>
            <div class="login-error-container" id="error-container"></div>
            <div class="login-buttons">
              <button type="button" class="btn-login" onclick="login()">Log in</button>
              <button type="button" class="btn-guestlogin" onclick="guestLogin()">Guest Log in</button>
            </div>
          </form>
        </div>
      </div>

      <div id="msg-box"></div>

      <footer>

        <a href="./public/privacy-policy.html">Privacy Policy</a>
        <a href="./public/legal-notice.html">Legal Notice</a>

      </footer>
    </div>
  </div>
</body>

</html>
